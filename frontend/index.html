<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Email Intent Classifier</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    text-align: center;
    background: white;
    padding: 40px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    width: 350px;
}

h1 {
    color: #333;
    margin-bottom: 10px;
}

p {
    color: #666;
    font-size: 14px;
}

.btn {
    display: block;
    margin: 15px 0;
    padding: 12px;
    text-decoration: none;
    color: white;
    border-radius: 8px;
    font-weight: bold;
    transition: 0.3s;
}

.login {
    background: #007bff;
}

.signup {
    background: #28a745;
}

.btn:hover {
    opacity: 0.8;
}

.footer {
    margin-top: 20px;
    font-size: 12px;
    color: gray;
}
</style>

</head>

<body>

<div class="container">

    <h1>📧 Email Intent Classifier</h1>

    <p>
        AI-powered system that classifies emails into categories like
        spam, request, complaint, inquiry, job, and meeting.
    </p>

    <a class="btn login" href="login.html">Login</a>
    <a class="btn signup" href="signup.html">Sign Up</a>

    <div class="footer">
        Final Year Project - AI Email Classifier
    </div>

</div>

</html>
