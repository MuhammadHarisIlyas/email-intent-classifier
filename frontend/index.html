<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Email Intent Classifier</title>

    <!-- Simple Styling -->
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 60%;
            margin: 40px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: #333;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 10px;
            margin-top: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        button {
            margin-top: 10px;
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            background: #007bff;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        .result {
            margin-top: 15px;
            padding: 10px;
            background: #e9f7ef;
            border-left: 5px solid green;
        }

        .gmail-section {
            margin-top: 30px;
        }

        .email-card {
            background: #fafafa;
            padding: 10px;
            margin-top: 10px;
            border-radius: 6px;
            border-left: 5px solid #007bff;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Email Intent Classifier</h1>

    <!-- TEXT INPUT -->
    <label>Enter Email:</label>
    <textarea id="emailText" placeholder="Type or paste email here..."></textarea>

    <!-- BUTTON -->
    <button onclick="classifyEmail()">Classify Email</button>

    <!-- RESULT -->
    <div id="result" class="result" style="display:none;"></div>

    <!-- GMAIL SECTION -->
    <div class="gmail-section">
        <h2>Fetch Gmail Emails</h2>
        <button onclick="fetchGmail()">Load Emails</button>

        <div id="gmailResults"></div>
    </div>

</div>

<!-- JAVASCRIPT -->
<script>

    // ============================
    // CLASSIFY MANUAL EMAIL
    // ============================
    function classifyEmail() {
        console.log("Button clicked");

        const text = document.getElementById("emailText").value;

        fetch("http://127.0.0.1:5001/predict", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                email: text
            })
        })
        .then(response => response.json())
        .then(data => {

            const resultDiv = document.getElementById("result");
            resultDiv.style.display = "block";
            resultDiv.innerHTML = "<b>Prediction:</b> " + data.prediction;

        })
        .catch(error => {
            console.error("Error:", error);
        });
    }


    // ============================
    // FETCH GMAIL EMAILS
    // ============================
    function fetchGmail() {

        fetch("http://127.0.0.1:5001/gmail")
        .then(response => response.json())
        .then(data => {

            const container = document.getElementById("gmailResults");
            container.innerHTML = "";

            data.forEach(item => {

                const div = document.createElement("div");
                div.className = "email-card";

                div.innerHTML = `
                    <p><b>Email:</b> ${item.email_preview}...</p>
                    <p><b>Intent:</b> ${item.intent}</p>
                `;

                container.appendChild(div);
            });

        })
        .catch(error => {
            console.error("Error:", error);
        });
    }

</script>

</body>
</html>
