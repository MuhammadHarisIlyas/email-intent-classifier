<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        .message {
            margin-top: 10px;
            font-size: 14px;
            color: red;
        }

        a {
            text-decoration: none;
            color: #007bff;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>User Login</h2>

    <input type="text" id="username" placeholder="Enter Username">
    <input type="password" id="password" placeholder="Enter Password">

    <button onclick="login()">Login</button>

    <!-- Message Area -->
    <p id="msg" class="message"></p>

    <!-- Signup Link -->
    <p>New user? <a href="signup.html">Signup</a></p>
</div>

<script>

function login() {

    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();

    const msg = document.getElementById("msg");

    // Check empty fields
    if (!username || !password) {
        msg.innerText = "Please fill all fields";
        return;
    }

    fetch("http://127.0.0.1:5001/user-login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            username: username,
            password: password
        })
    })
    .then(res => res.json())
    .then(data => {

        // ✅ SAFE HANDLING (NO undefined ERROR)
        if (data.status === "success") {

            msg.style.color = "green";
            msg.innerText = "Login successful! Redirecting...";

            setTimeout(() => {
                window.location.href = "dashboard.html";
            }, 1000);

        } else {

            msg.style.color = "red";
            msg.innerText = data.message || "Invalid login";

        }

    })
    .catch(error => {
        msg.innerText = "Server error. Try again.";
        console.log(error);
    });

}

</script>

</body>
</html>
